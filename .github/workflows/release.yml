name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: npm audit signatures

      - name: Lint & format (auto-fix)
        run: npm run lint:fix --silent

      - name: Fail if lint:fix produced changes
        run: |
          if ! git diff --quiet; then
            echo "::error::Lint/format fixes were needed. Run 'npm run lint:fix' locally and commit."
            git diff --stat
            exit 1
          fi

      - name: Test
        run: npm test --silent

      - name: Build
        run: npm run build --silent

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: npx semantic-release
